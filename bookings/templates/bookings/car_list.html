{% extends 'base.html' %}
{% block content %}
<h1>Наш автопарк</h1>
<div class="car-grid">
    {% for car in cars %}
    <div class="card">
        {% if car.image %}
            <img src="{{ car.image.url }}" class="car-img" alt="{{ car.brand }}">
        {% else %}
            <div style="height: 200px; background: #eee; border-radius: 8px; display: flex; align-items: center; justify-content: center;">Немає фото</div>
        {% endif %}
        <h3>{{ car.brand }} {{ car.model }}</h3>
        <p style="color: var(--primary); font-weight: bold;">{{ car.price_per_day }} грн/день</p>
        <a href="{% url 'car_detail' car.id %}" class="btn btn-primary" style="width: 100%; text-align: center;">Орендувати</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
