{% extends 'base.html' %} {% block title %}Бронювання: {{ car.brand }} {{
car.model }}{% endblock %} {% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto">
  <h2 style="margin-top: 0; text-align: center">Бронювання авто</h2>
  <p style="color: #64748b; text-align: center; margin-bottom: 1.5rem">
    {{ car.brand }} {{ car.model }} ({{ car.price_per_day }} грн/день)
  </p>

  {% if error %}
  <div
    style="
      background: #fee2e2;
      color: #991b1b;
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1.5rem;
      text-align: center;
    "
  >
    {{ error }}
  </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label style="font-weight: 500; margin-bottom: 0.5rem; display: block"
        >Початок оренди:</label
      >
      <input type="date" name="start_date" required />
    </div>
    <div class="form-group" style="margin-bottom: 2rem">
      <label style="font-weight: 500; margin-bottom: 0.5rem; display: block"
        >Завершення оренди:</label
      >
      <input type="date" name="end_date" required />
    </div>

    <div style="display: flex; gap: 1rem">
      <button type="submit" class="btn btn-primary" style="flex: 1">
        Підтвердити
      </button>
      <a
        href="{% url 'car_detail' car.pk %}"
        class="btn btn-outline"
        style="flex: 1; text-align: center; line-height: 1.5"
        >Скасувати</a
      >
    </div>
  </form>
</div>
{% endblock %}
