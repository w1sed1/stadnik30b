services:
  db:
    image: postgres:15
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

  web:
    build: .
    command: sh -c "python manage.py collectstatic --noinput && gunicorn car_rental.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
      - static_volume:/app/static   # ЗМІНИЛИ ТУТ
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: always

  celery:
    build: .
    command: celery -A car_rental worker -l info
    env_file:
      - .env
    depends_on:
      - web
      - redis
    restart: always

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static   # ЗМІНИЛИ ТУТ
      - media_volume:/app/media
    depends_on:
      - web
    restart: always

volumes:
  static_volume:
  media_volume:
  postgres_data: